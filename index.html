<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Pitches"/>
<link rel="manifest" href="manifest.json"/>
<title>Pitch Charter</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:#0a0f1a;--surface:#111827;--surface2:#1a2236;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.15);
  --text:#f0f4ff;--muted:#6b7a99;--accent:#3b82f6;--accent2:#f59e0b;
  --green:#22c55e;--red:#ef4444;
  --fd:'Barlow Condensed',sans-serif;--fb:'Barlow',sans-serif;
  --safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--fb);overflow:hidden}
.screen{display:none;flex-direction:column;height:100vh;height:100dvh}
.screen.active{display:flex}

#setupScreen{align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 0%,#1a2a4a 0%,var(--bg) 70%);padding:40px 24px calc(40px + var(--safe-bot))}
.setup-logo{font-family:var(--fd);font-size:48px;font-weight:700;letter-spacing:.05em;text-align:center;margin-bottom:6px}
.setup-sub{font-size:14px;color:var(--muted);margin-bottom:48px;text-align:center;letter-spacing:.08em;text-transform:uppercase}
.setup-card{background:var(--surface);border:.5px solid var(--border2);border-radius:20px;padding:28px;width:100%;max-width:420px}
.fg{margin-bottom:20px}
.fl{font-family:var(--fd);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;display:block}
.fi{width:100%;background:var(--surface2);border:.5px solid var(--border2);border-radius:10px;padding:14px 16px;color:var(--text);font-family:var(--fb);font-size:18px;outline:none;transition:border-color .2s}
.fi:focus{border-color:var(--accent)}.fi::placeholder{color:var(--muted)}
.start-btn{width:100%;background:var(--accent);border:none;border-radius:12px;padding:16px;color:#fff;font-family:var(--fd);font-size:20px;font-weight:700;letter-spacing:.05em;cursor:pointer;margin-top:8px}
.start-btn:active{opacity:.85}

.topbar{display:flex;align-items:center;justify-content:space-between;padding:calc(var(--safe-top) + 12px) 16px 10px;background:var(--surface);border-bottom:.5px solid var(--border);flex-shrink:0}
.game-info{font-family:var(--fd);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
.pitcher-name{font-family:var(--fd);font-size:22px;font-weight:700;line-height:1.1}
.topbar-right{display:flex;gap:8px;align-items:center}
.icon-btn{width:36px;height:36px;border-radius:8px;border:.5px solid var(--border2);background:var(--surface2);color:var(--muted);font-size:14px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.export-btn{padding:0 14px;height:36px;border-radius:8px;border:.5px solid var(--accent2);background:transparent;color:var(--accent2);font-family:var(--fd);font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap}

.pitcher-tabs{display:flex;overflow-x:auto;gap:6px;padding:8px 12px;background:var(--surface);border-bottom:.5px solid var(--border);flex-shrink:0;scrollbar-width:none}
.pitcher-tabs::-webkit-scrollbar{display:none}
.ptab{flex-shrink:0;padding:5px 14px;border-radius:20px;font-family:var(--fd);font-size:14px;font-weight:600;cursor:pointer;border:.5px solid var(--border2);color:var(--muted);background:transparent;white-space:nowrap}
.ptab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.ptab-add{flex-shrink:0;padding:5px 12px;border-radius:20px;font-size:18px;cursor:pointer;border:.5px dashed var(--border2);color:var(--muted);background:transparent}

.batter-strip{display:flex;align-items:center;padding:8px 12px;background:var(--surface2);border-bottom:.5px solid var(--border);flex-shrink:0;gap:10px}
.nav-btn{width:32px;height:32px;border-radius:8px;background:var(--surface);border:.5px solid var(--border2);color:var(--text);font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.batter-display{display:flex;align-items:center;gap:8px;background:var(--surface);border:.5px solid var(--border2);border-radius:10px;padding:4px 12px 4px 8px;cursor:pointer}
.batter-jersey-label{font-family:var(--fd);font-size:10px;text-transform:uppercase;color:var(--muted);letter-spacing:.08em}
.batter-num{font-family:var(--fd);font-size:28px;font-weight:700;color:var(--accent2);line-height:1}
.batter-ab{font-family:var(--fd);font-size:11px;color:var(--muted);text-transform:uppercase}
.pitch-count-strip{margin-left:auto;display:flex;gap:12px}
.count-item{text-align:center}
.count-val{font-family:var(--fd);font-size:20px;font-weight:700;line-height:1}
.count-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)}

.view-nav{display:flex;background:var(--surface);border-bottom:.5px solid var(--border);flex-shrink:0}
.vnav-btn{flex:1;padding:9px 4px;font-family:var(--fd);font-size:13px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);border:none;background:transparent;cursor:pointer;border-bottom:2px solid transparent}
.vnav-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--safe-bot) + 16px)}

.controls-panel{padding:12px;display:flex;flex-direction:column;gap:10px}
.ctrl-row{display:flex;gap:8px}
.ctrl-btn{flex:1;padding:12px 8px;border-radius:10px;border:.5px solid var(--border2);background:var(--surface);color:var(--muted);font-family:var(--fd);font-size:16px;font-weight:600;cursor:pointer;text-align:center}
.ctrl-btn.active{color:#fff;border-color:transparent}
.ctrl-btn.active.fb{background:var(--accent)}
.ctrl-btn.active.nfb{background:var(--accent2)}
.ctrl-btn.active.ball{background:var(--surface2);color:var(--muted);border-color:var(--border2);outline:2px solid var(--text)}
.ctrl-btn.active.ss{background:#7c3aed}
.ctrl-btn.active.sl{background:#6d28d9}
.ctrl-btn.active.out{background:var(--red)}
.ctrl-btn.active.hit{background:var(--green)}

.zone-wrap{padding:0 12px 12px;display:flex;flex-direction:column;align-items:center}
.zone-instruction{font-size:12px;color:var(--muted);margin-bottom:8px;text-align:center}
canvas{touch-action:none;border-radius:8px;display:block}
.zone-actions{display:flex;justify-content:space-between;align-items:center;margin-top:8px;width:100%}
.undo-btn{padding:8px 16px;border-radius:8px;border:.5px solid var(--border2);background:transparent;color:var(--muted);font-family:var(--fd);font-size:14px;font-weight:600;cursor:pointer}
.new-ab-btn{padding:8px 16px;border-radius:8px;border:.5px solid var(--accent);background:transparent;color:var(--accent);font-family:var(--fd);font-size:14px;font-weight:600;cursor:pointer}
.legend{display:flex;flex-wrap:wrap;gap:10px;padding:0 12px 4px}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted)}
.dot{width:9px;height:9px;border-radius:50%;display:inline-block}

.history-wrap{padding:12px}
.history-batter-header{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--surface);border-radius:12px 12px 0 0;border:.5px solid var(--border2)}
.history-jersey{font-family:var(--fd);font-size:36px;font-weight:700;color:var(--accent2);line-height:1}
.history-meta-top{font-family:var(--fd);font-size:13px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.history-meta-bot{font-family:var(--fd);font-size:16px;font-weight:600}
.ab-block{border:.5px solid var(--border2);border-top:none;background:var(--surface2);padding:10px 14px}
.ab-block:last-child{border-radius:0 0 12px 12px;margin-bottom:16px}
.ab-title{font-family:var(--fd);font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:8px}
.pitch-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:.5px solid var(--border);font-size:13px}
.pitch-row:last-child{border-bottom:none}
.pnum{font-family:var(--fd);font-size:11px;color:var(--muted);min-width:20px}
.ptype-badge{padding:2px 8px;border-radius:6px;font-family:var(--fd);font-size:12px;font-weight:600;min-width:44px;text-align:center}
.ptype-badge.FB{background:rgba(59,130,246,.2);color:#93c5fd}
.ptype-badge.NFB{background:rgba(245,158,11,.2);color:#fcd34d}
.presult{color:var(--text);font-size:13px}
.mini-zone-wrap{margin-top:6px;display:flex;justify-content:center}

.heatmap-wrap{padding:12px;display:flex;flex-direction:column;align-items:center;gap:10px}
.heat-filters{display:flex;gap:6px}
.heat-filter{padding:6px 16px;border-radius:20px;font-family:var(--fd);font-size:14px;font-weight:600;cursor:pointer;border:.5px solid var(--border2);color:var(--muted);background:transparent}
.heat-filter.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.heat-legend-row{display:flex;align-items:center;gap:10px;width:100%;max-width:340px}
.heat-legend-bar{flex:1;height:8px;border-radius:4px}
.heat-legend-lbl{font-size:11px;color:var(--muted)}

.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center;padding:24px}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border:.5px solid var(--border2);border-radius:20px;padding:24px;width:100%;max-width:360px}
.modal-title{font-family:var(--fd);font-size:22px;font-weight:700;margin-bottom:16px}
.modal-actions{display:flex;gap:8px;margin-top:20px}
.modal-cancel{flex:1;padding:12px;border-radius:10px;border:.5px solid var(--border2);background:transparent;color:var(--muted);font-family:var(--fd);font-size:16px;font-weight:600;cursor:pointer}
.modal-confirm{flex:1;padding:12px;border-radius:10px;border:none;background:var(--accent);color:#fff;font-family:var(--fd);font-size:16px;font-weight:600;cursor:pointer}

/* ══ PRINT ══ */
@media print {
  @page{size:letter portrait;margin:.55in}
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
  body{overflow:visible!important;background:#fff!important;color:#000!important;font-family:'Barlow Condensed',Arial,sans-serif;font-size:10px}
  .screen{display:none!important}
  #printReport{display:block!important}
  .no-print{display:none!important}
  .pr-page{page-break-after:always}
  .pr-page:last-child{page-break-after:avoid}

  .pr-header{text-align:center;border-bottom:2px solid #000;padding-bottom:8px;margin-bottom:14px}
  .pr-title{font-size:20px;font-weight:700;letter-spacing:.05em;text-transform:uppercase}
  .pr-meta{font-size:10px;color:#555;margin-top:3px}
  .pr-meta-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px 20px;font-size:9px;margin-top:6px;text-align:left}
  .pr-meta-label{color:#888}

  .pr-scorecard{width:100%;border-collapse:collapse;font-size:8.5px;margin-bottom:18px}
  .pr-scorecard th{background:#111;color:#fff;padding:3px 5px;text-align:center;border:.5px solid #000}
  .pr-scorecard td{border:.5px solid #bbb;padding:2px 5px;text-align:center;vertical-align:middle;height:20px}
  .pr-scorecard .td-batter{text-align:left;font-weight:700;padding-left:6px}
  .pr-scorecard tr:nth-child(even) td{background:#f5f5f5}
  .pr-scorecard .td-total{font-weight:700;background:#e8e8e8!important}
  .pr-hit{color:#155724;font-weight:700}
  .pr-out{color:#721c24}
  .pr-k{color:#3d1a8e;font-weight:700}

  .pr-pitcher-block{margin-bottom:16px}
  .pr-pitcher-name{font-size:15px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;border-bottom:1.5px solid #000;padding-bottom:3px;margin-bottom:8px}
  .pr-stats-table{border-collapse:collapse;font-size:9px;margin-bottom:10px}
  .pr-stats-table th{background:#333;color:#fff;padding:3px 8px;text-align:center}
  .pr-stats-table td{border:.5px solid #ccc;padding:3px 8px;text-align:center}
  .pr-heatmap-label{font-size:8px;color:#666;text-align:center;margin-top:3px;text-transform:uppercase;letter-spacing:.04em}

  .pr-ab-section{margin-top:10px}
  .pr-ab-section-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#555;margin-bottom:6px;border-bottom:.5px solid #ddd;padding-bottom:3px}
  .pr-ab-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  .pr-ab-card{border:.5px solid #bbb;border-radius:4px;padding:6px 7px;background:#fafafa;break-inside:avoid}
  .pr-ab-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
  .pr-ab-batter{font-size:13px;font-weight:700}
  .pr-ab-label{font-size:8px;color:#777;text-transform:uppercase;letter-spacing:.04em}
  .pr-ab-pitches{font-size:8px;margin-top:3px;line-height:1.7}
  .pr-ab-pitch-item{display:inline-block;margin-right:3px;margin-bottom:2px;padding:1px 4px;border-radius:3px;border:.5px solid #ccc;background:#f0f0f0}
  .pr-ab-pitch-item.FB{border-color:#3b82f6;color:#1e40af;background:#eff6ff}
  .pr-ab-pitch-item.NFB{border-color:#d97706;color:#78350f;background:#fffbeb}
  .pr-ab-pitch-item.hit{border-color:#16a34a;color:#14532d;background:#f0fdf4}
  .pr-ab-pitch-item.out{border-color:#dc2626;color:#7f1d1d;background:#fef2f2}
}
#printReport{display:none}
</style>
</head>
<body>

<!-- SETUP -->
<div class="screen active" id="setupScreen">
  <div class="setup-logo">PITCH<br>CHARTER</div>
  <div class="setup-sub">Baseball scouting tool</div>
  <div class="setup-card">
    <div class="fg"><label class="fl">Our team</label><input class="fi" id="ourTeam" placeholder="e.g. Needham" maxlength="30"/></div>
    <div class="fg"><label class="fl">Opposing team</label><input class="fi" id="oppTeam" placeholder="e.g. Wellesley" maxlength="30"/></div>
    <div class="fg" style="margin-bottom:0"><label class="fl">First pitcher name</label><input class="fi" id="firstPitcher" placeholder="e.g. Smith" maxlength="30"/></div>
    <button class="start-btn" onclick="startGame()">Start charting ›</button>
    <button class="start-btn" onclick="newGame()" style="background:transparent;border:.5px solid var(--border2);color:var(--muted);margin-top:8px;font-size:16px">Clear saved data &amp; start fresh</button>
  </div>
</div>

<!-- APP -->
<div class="screen" id="appScreen">
  <div class="topbar">
    <div>
      <div class="game-info" id="gameInfo">vs —</div>
      <div class="pitcher-name" id="activePitcherName">—</div>
    </div>
    <div class="topbar-right">
      <button class="export-btn no-print" onclick="exportPDF()">⬇ PDF</button>
      <div class="icon-btn no-print" onclick="openNewPitcherModal()" title="Add pitcher">+P</div>
      <div class="icon-btn no-print" onclick="goSetup()" title="New game">↩</div>
    </div>
  </div>
  <div class="pitcher-tabs" id="pitcherTabs"></div>
  <div class="batter-strip">
    <div style="display:flex;align-items:center;gap:6px">
      <div class="nav-btn" onclick="prevBatter()">‹</div>
      <div class="batter-display" onclick="openBatterModal()">
        <div><div class="batter-jersey-label">Jersey</div><div class="batter-num" id="batterNumDisplay">—</div></div>
        <div><div class="batter-ab" id="batterAbDisplay">AB 1</div><div style="font-size:10px;color:var(--muted)">tap to set</div></div>
      </div>
      <div class="nav-btn" onclick="nextBatter()">›</div>
    </div>
    <div class="pitch-count-strip">
      <div class="count-item"><div class="count-val" id="countB" style="color:var(--muted)">0</div><div class="count-lbl">B</div></div>
      <div class="count-item"><div class="count-val" id="countS" style="color:var(--accent2)">0</div><div class="count-lbl">S</div></div>
      <div class="count-item"><div class="count-val" id="countTotal" style="color:var(--text)">0</div><div class="count-lbl">Pitch</div></div>
    </div>
  </div>
  <div class="view-nav">
    <button class="vnav-btn active" onclick="setView('chart')" id="vChart">Chart</button>
    <button class="vnav-btn" onclick="setView('heat')" id="vHeat">Heatmap</button>
    <button class="vnav-btn" onclick="setView('history')" id="vHistory">History</button>
  </div>

  <!-- CHART -->
  <div class="content" id="viewChart">
    <div class="controls-panel">
      <div>
        <div style="font-family:var(--fd);font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:6px">Pitch type</div>
        <div class="ctrl-row">
          <button class="ctrl-btn active fb" id="btnFB" onclick="setPType('FB')">Fastball</button>
          <button class="ctrl-btn nfb" id="btnNFB" onclick="setPType('NFB')">Non-FB</button>
        </div>
      </div>
      <div>
        <div style="font-family:var(--fd);font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:6px">Result</div>
        <div class="ctrl-row">
          <button class="ctrl-btn active ball" id="rBall" onclick="setResult('Ball')">Ball</button>
          <button class="ctrl-btn ss" id="rSS" onclick="setResult('SS')">K swing</button>
          <button class="ctrl-btn sl" id="rSL" onclick="setResult('SL')">K look</button>
        </div>
        <div class="ctrl-row" style="margin-top:6px">
          <button class="ctrl-btn out" id="rOut" onclick="setResult('Out')">In play — out</button>
          <button class="ctrl-btn hit" id="rHit" onclick="setResult('Hit')">In play — hit</button>
        </div>
      </div>
    </div>
    <div class="legend">
      <span class="legend-item"><span class="dot" style="background:transparent;border:1.5px solid var(--muted)"></span>Ball</span>
      <span class="legend-item"><span class="dot" style="background:#7c3aed;border-radius:2px"></span>Strike</span>
      <span class="legend-item"><span class="dot" style="background:var(--green)"></span>In play</span>
      <span class="legend-item"><span class="dot" style="background:var(--accent)"></span>FB</span>
      <span class="legend-item"><span class="dot" style="background:var(--accent2)"></span>Non-FB</span>
    </div>
    <div class="zone-wrap">
      <div class="zone-instruction">Tap the zone to place a pitch</div>
      <canvas id="mainCanvas"></canvas>
      <div class="zone-actions">
        <button class="undo-btn" onclick="undoLast()">← Undo</button>
        <button class="new-ab-btn" onclick="newAB()">New AB +</button>
      </div>
    </div>
  </div>

  <!-- HEATMAP -->
  <div class="content" id="viewHeat" style="display:none">
    <div class="heatmap-wrap">
      <div class="heat-filters">
        <button class="heat-filter active" id="hfAll" onclick="setHF('all')">All</button>
        <button class="heat-filter" id="hfFB" onclick="setHF('FB')">Fastball</button>
        <button class="heat-filter" id="hfNFB" onclick="setHF('NFB')">Non-FB</button>
      </div>
      <canvas id="heatCanvas"></canvas>
      <div class="heat-legend-row">
        <span class="heat-legend-lbl">Low</span>
        <div class="heat-legend-bar" style="background:linear-gradient(to right,rgba(59,130,246,.3),rgba(239,68,68,.9))"></div>
        <span class="heat-legend-lbl">High</span>
      </div>
    </div>
  </div>

  <!-- HISTORY -->
  <div class="content" id="viewHistory" style="display:none">
    <div class="history-wrap" id="historyContent"></div>
  </div>
</div>

<!-- PRINT REPORT -->
<div id="printReport"></div>

<!-- MODALS -->
<div class="modal-overlay" id="batterModal">
  <div class="modal">
    <div class="modal-title">Set batter jersey #</div>
    <input class="fi" id="batterInput" type="number" placeholder="e.g. 14" min="0" max="99" style="font-size:32px;text-align:center;letter-spacing:.1em"/>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeModal('batterModal')">Cancel</button>
      <button class="modal-confirm" onclick="confirmBatter()">Set</button>
    </div>
  </div>
</div>
<div class="modal-overlay" id="newPitcherModal">
  <div class="modal">
    <div class="modal-title">Add pitcher</div>
    <input class="fi" id="newPitcherInput" placeholder="Pitcher name" maxlength="30"/>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeModal('newPitcherModal')">Cancel</button>
      <button class="modal-confirm" onclick="confirmNewPitcher()">Add</button>
    </div>
  </div>
</div>

<script>
let state={ourTeam:'',oppTeam:'',pitchers:[],activePitcher:0,activeBatterJersey:null,activeBatterAB:0,pitchType:'FB',result:'Ball',view:'chart'};
function save(){try{localStorage.setItem('pitchapp',JSON.stringify(state));}catch(e){}}
function load(){try{const s=localStorage.getItem('pitchapp');if(s){state=JSON.parse(s);return true;}}catch(e){}return false;}

function startGame(){
  state.ourTeam=document.getElementById('ourTeam').value.trim()||'Us';
  state.oppTeam=document.getElementById('oppTeam').value.trim()||'Them';
  const p=document.getElementById('firstPitcher').value.trim()||'Pitcher 1';
  state.pitchers=[{name:p,batters:{}}];
  state.activePitcher=0;state.activeBatterJersey=null;state.activeBatterAB=0;
  state.pitchType='FB';state.result='Ball';save();initApp();
}
function newGame(){localStorage.clear();location.reload();}
function goSetup(){document.getElementById('setupScreen').classList.add('active');document.getElementById('appScreen').classList.remove('active');}
function initApp(){
  document.getElementById('setupScreen').classList.remove('active');
  document.getElementById('appScreen').classList.add('active');
  document.getElementById('gameInfo').textContent='vs '+state.oppTeam;
  renderPitcherTabs();updateBatterStrip();setView('chart');setupCanvas();
}

let CW=340,CH=306;
function setupCanvas(){
  CW=Math.min(window.innerWidth-24,420);CH=Math.round(CW*0.9);
  const mc=document.getElementById('mainCanvas');
  mc.width=CW;mc.height=CH;
  mc.addEventListener('click',onCanvasClick);
  mc.addEventListener('touchend',onCanvasTouch,{passive:false});
  const hc=document.getElementById('heatCanvas');hc.width=CW;hc.height=CH;
  redrawMain();
}

function szRect(w,h){
  const pl=38,pr=18,pt=18,pb=50;
  const zw=(w-pl-pr)*.52,zh=(h-pt-pb)*.62;
  return{x:pl+(w-pl-pr-zw)/2,y:pt+(h-pt-pb-zh)*.3,w:zw,h:zh};
}

function drawBase(ctx,w,h,dark){
  ctx.clearRect(0,0,w,h);
  const sz=szRect(w,h),m=sz.w*.22;
  ctx.strokeStyle=dark?'rgba(255,255,255,0.06)':'rgba(0,0,0,0.12)';
  ctx.lineWidth=.5;ctx.setLineDash([4,4]);
  ctx.strokeRect(sz.x-m,sz.y-m,sz.w+m*2,sz.h+m*2);
  ctx.setLineDash([]);
  ctx.fillStyle=dark?'rgba(59,130,246,0.06)':'rgba(59,130,246,0.04)';
  ctx.fillRect(sz.x,sz.y,sz.w,sz.h);
  ctx.strokeStyle=dark?'rgba(59,130,246,0.2)':'rgba(59,130,246,0.3)';
  ctx.lineWidth=.5;
  for(let i=1;i<3;i++){
    ctx.beginPath();ctx.moveTo(sz.x+sz.w*i/3,sz.y);ctx.lineTo(sz.x+sz.w*i/3,sz.y+sz.h);ctx.stroke();
    ctx.beginPath();ctx.moveTo(sz.x,sz.y+sz.h*i/3);ctx.lineTo(sz.x+sz.w,sz.y+sz.h*i/3);ctx.stroke();
  }
  ctx.strokeStyle='#3b82f6';ctx.lineWidth=1.5;ctx.strokeRect(sz.x,sz.y,sz.w,sz.h);
  const px=sz.x+sz.w/2,py=sz.y+sz.h+22,pw=sz.w*.55,ph=18;
  ctx.fillStyle=dark?'rgba(255,255,255,0.08)':'rgba(0,0,0,0.06)';
  ctx.beginPath();ctx.moveTo(px-pw/2,py);ctx.lineTo(px+pw/2,py);
  ctx.lineTo(px+pw/2,py+ph*.6);ctx.lineTo(px,py+ph);ctx.lineTo(px-pw/2,py+ph*.6);
  ctx.closePath();ctx.fill();
  ctx.strokeStyle=dark?'rgba(255,255,255,0.2)':'rgba(0,0,0,0.25)';ctx.lineWidth=.5;ctx.stroke();
  ctx.fillStyle=dark?'rgba(107,122,153,0.8)':'rgba(80,80,100,0.7)';
  const fs=Math.max(9,Math.round(w*.024));ctx.font=fs+'px Barlow Condensed,Arial,sans-serif';
  ctx.textAlign='right';ctx.fillText('HIGH',sz.x-4,sz.y+10);ctx.fillText('LOW',sz.x-4,sz.y+sz.h+4);
  ctx.textAlign='center';ctx.fillText('BATTER \u203a',sz.x+sz.w/2,sz.y+sz.h+42);
  return sz;
}

function drawPitch(ctx,p){
  const r=7,blue=p.type==='FB';
  ctx.save();
  if(p.result==='Ball'){
    ctx.beginPath();ctx.arc(p.x,p.y,r,0,Math.PI*2);
    ctx.strokeStyle=blue?'#3b82f6':'#f59e0b';ctx.lineWidth=2;ctx.stroke();
  } else if(p.result==='SS'||p.result==='SL'){
    ctx.strokeStyle=blue?'#818cf8':'#c084fc';ctx.lineWidth=2.5;
    ctx.beginPath();ctx.moveTo(p.x-r,p.y-r);ctx.lineTo(p.x+r,p.y+r);ctx.stroke();
    ctx.beginPath();ctx.moveTo(p.x+r,p.y-r);ctx.lineTo(p.x-r,p.y+r);ctx.stroke();
    if(p.result==='SL'){ctx.strokeStyle='rgba(192,132,252,.4)';ctx.lineWidth=1;ctx.beginPath();ctx.arc(p.x,p.y,r+4,0,Math.PI*2);ctx.stroke();}
  } else {
    ctx.fillStyle=p.result==='Hit'?'#22c55e':'#ef4444';
    ctx.beginPath();ctx.arc(p.x,p.y,r,0,Math.PI*2);ctx.fill();
    if(!blue){ctx.strokeStyle='#f59e0b';ctx.lineWidth=1.5;ctx.stroke();}
  }
  ctx.restore();
}

function currentPitches(){
  if(state.activeBatterJersey===null)return[];
  const abs=state.pitchers[state.activePitcher].batters[state.activeBatterJersey];
  return(abs&&abs[state.activeBatterAB])||[];
}
function redrawMain(){
  const mc=document.getElementById('mainCanvas');if(!mc)return;
  const ctx=mc.getContext('2d');drawBase(ctx,CW,CH,true);
  currentPitches().forEach(p=>drawPitch(ctx,p));updateCounts();
}
function canvasCoords(e,c){const r=c.getBoundingClientRect();return{x:(e.clientX-r.left)*c.width/r.width,y:(e.clientY-r.top)*c.height/r.height};}
function onCanvasClick(e){placePitch(canvasCoords(e,this));}
function onCanvasTouch(e){e.preventDefault();placePitch(canvasCoords(e.changedTouches[0],document.getElementById('mainCanvas')));}
function placePitch(c){
  if(state.activeBatterJersey===null){openBatterModal();return;}
  const p=state.pitchers[state.activePitcher];
  if(!p.batters[state.activeBatterJersey])p.batters[state.activeBatterJersey]=[];
  const abs=p.batters[state.activeBatterJersey];
  while(abs.length<=state.activeBatterAB)abs.push([]);
  abs[state.activeBatterAB].push({x:c.x,y:c.y,type:state.pitchType,result:state.result});
  save();redrawMain();
}

function setPType(t){state.pitchType=t;document.getElementById('btnFB').classList.toggle('active',t==='FB');document.getElementById('btnNFB').classList.toggle('active',t==='NFB');}
function setResult(r){state.result=r;['Ball','SS','SL','Out','Hit'].forEach(id=>document.getElementById('r'+id).classList.remove('active'));document.getElementById('r'+r).classList.add('active');}

function updateCounts(){
  const ps=currentPitches();let b=0,s=0;
  ps.forEach(p=>{if(p.result==='Ball')b++;else if(p.result==='SS'||p.result==='SL')s++;});
  document.getElementById('countB').textContent=b;
  document.getElementById('countS').textContent=s;
  document.getElementById('countTotal').textContent=ps.length;
}
function updateBatterStrip(){
  const j=state.activeBatterJersey;
  document.getElementById('batterNumDisplay').textContent=j!==null?'#'+j:'—';
  document.getElementById('batterAbDisplay').textContent='AB '+(state.activeBatterAB+1);
  updateCounts();
}
function prevBatter(){
  const p=state.pitchers[state.activePitcher];
  const js=Object.keys(p.batters).map(Number).sort((a,b)=>a-b);if(!js.length)return;
  const i=js.indexOf(state.activeBatterJersey);const prev=i<=0?js[js.length-1]:js[i-1];
  state.activeBatterJersey=prev;state.activeBatterAB=Math.max(0,(p.batters[prev]||[]).length-1);
  updateBatterStrip();save();redrawMain();
}
function nextBatter(){
  const p=state.pitchers[state.activePitcher];
  const js=Object.keys(p.batters).map(Number).sort((a,b)=>a-b);if(!js.length)return;
  const i=js.indexOf(state.activeBatterJersey);const next=i>=js.length-1?js[0]:js[i+1];
  state.activeBatterJersey=next;state.activeBatterAB=Math.max(0,(p.batters[next]||[]).length-1);
  updateBatterStrip();save();redrawMain();
}
function newAB(){
  if(state.activeBatterJersey===null)return;
  const p=state.pitchers[state.activePitcher];
  if(!p.batters[state.activeBatterJersey])p.batters[state.activeBatterJersey]=[];
  p.batters[state.activeBatterJersey].push([]);
  state.activeBatterAB=p.batters[state.activeBatterJersey].length-1;
  updateBatterStrip();save();redrawMain();
}
function undoLast(){const ps=currentPitches();if(ps.length){ps.pop();save();redrawMain();}}

function renderPitcherTabs(){
  const tabs=document.getElementById('pitcherTabs');tabs.innerHTML='';
  state.pitchers.forEach((p,i)=>{
    const btn=document.createElement('button');
    btn.className='ptab'+(i===state.activePitcher?' active':'');
    btn.textContent=p.name;btn.onclick=()=>switchPitcher(i);tabs.appendChild(btn);
  });
  const add=document.createElement('button');add.className='ptab-add';add.textContent='+';add.onclick=openNewPitcherModal;tabs.appendChild(add);
  document.getElementById('activePitcherName').textContent=state.pitchers[state.activePitcher].name;
}
function switchPitcher(i){state.activePitcher=i;state.activeBatterJersey=null;state.activeBatterAB=0;renderPitcherTabs();updateBatterStrip();save();redrawMain();}
function openNewPitcherModal(){document.getElementById('newPitcherModal').classList.add('open');document.getElementById('newPitcherInput').value='';document.getElementById('newPitcherInput').focus();}
function confirmNewPitcher(){
  const name=document.getElementById('newPitcherInput').value.trim();if(!name)return;
  state.pitchers.push({name,batters:{}});state.activePitcher=state.pitchers.length-1;state.activeBatterJersey=null;state.activeBatterAB=0;
  closeModal('newPitcherModal');renderPitcherTabs();updateBatterStrip();save();redrawMain();
}
function openBatterModal(){document.getElementById('batterModal').classList.add('open');document.getElementById('batterInput').value='';document.getElementById('batterInput').focus();}
function confirmBatter(){
  const val=parseInt(document.getElementById('batterInput').value);if(isNaN(val)||val<0||val>99)return;
  const p=state.pitchers[state.activePitcher];
  if(!p.batters[val])p.batters[val]=[];
  if(!p.batters[val].length)p.batters[val].push([]);
  state.activeBatterJersey=val;state.activeBatterAB=p.batters[val].length-1;
  closeModal('batterModal');updateBatterStrip();save();redrawMain();
}
function closeModal(id){document.getElementById(id).classList.remove('open');}

function setView(v){
  ['chart','heat','history'].forEach(vv=>{
    document.getElementById('view'+vv.charAt(0).toUpperCase()+vv.slice(1)).style.display=v===vv?'block':'none';
    document.getElementById('v'+vv.charAt(0).toUpperCase()+vv.slice(1)).classList.toggle('active',v===vv);
  });
  if(v==='heat')drawHeatmap();if(v==='history')drawHistory();if(v==='chart')redrawMain();
}

let heatFilter='all';
function setHF(f){
  heatFilter=f;
  ['All','FB','NFB'].forEach(k=>document.getElementById('hf'+k).classList.remove('active'));
  document.getElementById('hf'+(f==='all'?'All':f==='FB'?'FB':'NFB')).classList.add('active');
  drawHeatmap();
}
function drawHeatmapOnCanvas(canvas,pitcher,filter,dark){
  const w=canvas.width,h=canvas.height,ctx=canvas.getContext('2d');
  drawBase(ctx,w,h,dark);
  const gs=Math.max(16,Math.round(w/20));
  const gw=Math.ceil(w/gs),gh=Math.ceil(h/gs);
  const grid=Array.from({length:gw},()=>Array(gh).fill(0));
  let max=0;
  Object.values(pitcher.batters).forEach(abs=>abs.forEach(ab=>ab.forEach(p=>{
    if(filter!=='all'&&p.type!==filter)return;
    const gi=Math.min(Math.floor(p.x/gs),gw-1),gj=Math.min(Math.floor(p.y/gs),gh-1);
    grid[gi][gj]++;if(grid[gi][gj]>max)max=grid[gi][gj];
  })));
  if(max>0)for(let i=0;i<gw;i++)for(let j=0;j<gh;j++){
    if(!grid[i][j])continue;
    const v=grid[i][j]/max;
    ctx.fillStyle=`rgba(${Math.round(v*220+39)},${Math.round((1-v)*130+82)},${Math.round((1-v)*246)},${.25+v*.65})`;
    ctx.fillRect(i*gs,j*gs,gs,gs);
  }
  const sz=szRect(w,h);
  ctx.strokeStyle='#3b82f6';ctx.lineWidth=1.5;ctx.strokeRect(sz.x,sz.y,sz.w,sz.h);
  ctx.strokeStyle='rgba(59,130,246,.3)';ctx.lineWidth=.5;
  for(let i=1;i<3;i++){
    ctx.beginPath();ctx.moveTo(sz.x+sz.w*i/3,sz.y);ctx.lineTo(sz.x+sz.w*i/3,sz.y+sz.h);ctx.stroke();
    ctx.beginPath();ctx.moveTo(sz.x,sz.y+sz.h*i/3);ctx.lineTo(sz.x+sz.w,sz.y+sz.h*i/3);ctx.stroke();
  }
  if(!max){ctx.fillStyle=dark?'rgba(107,122,153,.8)':'#aaa';ctx.font='13px Barlow Condensed,sans-serif';ctx.textAlign='center';ctx.fillText('No pitches',w/2,h/2);}
}
function drawHeatmap(){drawHeatmapOnCanvas(document.getElementById('heatCanvas'),state.pitchers[state.activePitcher],heatFilter,true);}

function drawHistory(){
  const container=document.getElementById('historyContent');
  const pitcher=state.pitchers[state.activePitcher];
  const jerseys=Object.keys(pitcher.batters).map(Number).sort((a,b)=>a-b);
  if(!jerseys.length){container.innerHTML='<div style="padding:24px;text-align:center;color:var(--muted);font-family:var(--fd);font-size:16px">No batters logged yet</div>';return;}
  container.innerHTML='';
  jerseys.forEach(jersey=>{
    const abs=pitcher.batters[jersey];
    const total=abs.reduce((s,ab)=>s+ab.length,0);
    const hdr=document.createElement('div');hdr.className='history-batter-header';
    hdr.innerHTML=`<div class="history-jersey">#${jersey}</div><div><div class="history-meta-top">${abs.length} AB${abs.length!==1?'s':''} \u00b7 ${total} pitch${total!==1?'es':''}</div><div class="history-meta-bot">${state.oppTeam} \u2014 #${jersey}</div></div>`;
    container.appendChild(hdr);
    abs.forEach((ab,ai)=>{
      const block=document.createElement('div');block.className='ab-block';
      let rows=`<div class="ab-title">AB ${ai+1} \u2014 ${ab.length} pitch${ab.length!==1?'es':''}</div>`;
      if(!ab.length)rows+='<div style="font-size:13px;color:var(--muted)">No pitches</div>';
      ab.forEach((p,i)=>{
        const rl=p.result==='SS'?'Strike (swing)':p.result==='SL'?'Strike (look)':p.result;
        rows+=`<div class="pitch-row"><span class="pnum">${i+1}</span><span class="ptype-badge ${p.type}">${p.type}</span><span class="presult">${rl}</span></div>`;
      });
      block.innerHTML=rows;
      if(ab.length){
        const wrap=document.createElement('div');wrap.className='mini-zone-wrap';
        const mc=document.createElement('canvas');const mw=Math.min(CW*.7,240);
        mc.width=mw;mc.height=Math.round(mw*.9);mc.style.borderRadius='8px';wrap.appendChild(mc);block.appendChild(wrap);
        const ctx=mc.getContext('2d');const sc=mw/CW;ctx.save();ctx.scale(sc,sc);
        drawBase(ctx,CW,CH,true);ab.forEach(p=>drawPitch(ctx,p));ctx.restore();
      }
      container.appendChild(block);
    });
  });
}

/* ══ PDF EXPORT ══ */
function abResult(ab){
  if(!ab.length)return'—';
  const last=ab[ab.length-1];
  if(last.result==='Hit')return'HIT';if(last.result==='Out')return'OUT';
  if(last.result==='SS'||last.result==='SL')return'K';
  let b=0,s=0;ab.forEach(p=>{if(p.result==='Ball')b++;else if(p.result==='SS'||p.result==='SL')s++;});
  return b+'-'+s;
}
function pitcherStats(pitcher){
  let total=0,balls=0,strikes=0,ks=0,hits=0,outs=0,fb=0,nfb=0;
  Object.values(pitcher.batters).forEach(abs=>abs.forEach(ab=>ab.forEach(p=>{
    total++;if(p.result==='Ball')balls++;else if(p.result==='SS'||p.result==='SL'){strikes++;ks++;}
    else if(p.result==='Hit')hits++;else if(p.result==='Out')outs++;
    if(p.type==='FB')fb++;else nfb++;
  })));
  return{total,balls,strikes,ks,hits,outs,fb,nfb};
}
function canvasImg(pitches,size,dark){
  const c=document.createElement('canvas');c.width=size;c.height=Math.round(size*.9);
  const sc=size/CW,ctx=c.getContext('2d');ctx.save();ctx.scale(sc,sc);
  drawBase(ctx,CW,CH,dark);pitches.forEach(p=>drawPitch(ctx,p));ctx.restore();
  return c.toDataURL('image/png');
}
function heatImg(pitcher,filter,size){
  const c=document.createElement('canvas');c.width=size;c.height=Math.round(size*.9);
  drawHeatmapOnCanvas(c,pitcher,filter,false);return c.toDataURL('image/png');
}

function exportPDF(){
  const report=document.getElementById('printReport');
  const date=new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  let html='';

  /* PAGE 1 — header + scorecard */
  html+=`<div class="pr-page">`;
  html+=`<div class="pr-header">
    <div class="pr-title">Pitch Chart \u2014 ${state.ourTeam} vs ${state.oppTeam}</div>
    <div class="pr-meta">${date} &nbsp;&middot;&nbsp; Pitchers: ${state.pitchers.map(p=>p.name).join(', ')}</div>
  </div>`;

  const allJerseys=[...new Set(state.pitchers.flatMap(p=>Object.keys(p.batters).map(Number)))].sort((a,b)=>a-b);

  html+=`<table class="pr-scorecard"><thead>
    <tr><th>Jersey #</th>`;
  state.pitchers.forEach(p=>{html+=`<th colspan="2">${p.name}</th>`;});
  html+=`<th>ABs</th><th>H</th><th>K</th></tr>
    <tr><th></th>`;
  state.pitchers.forEach(()=>{html+=`<th style="font-weight:400;font-size:7px;background:#333">AB 1</th><th style="font-weight:400;font-size:7px;background:#333">AB 2+</th>`;});
  html+=`<th></th><th></th><th></th></tr></thead><tbody>`;

  allJerseys.forEach(j=>{
    let totalABs=0,hits=0,ks=0;
    html+=`<tr><td class="td-batter">#${j}</td>`;
    state.pitchers.forEach(pitcher=>{
      const abs=pitcher.batters[j]||[];totalABs+=abs.length;
      const r0=abs[0]&&abs[0].length?abResult(abs[0]):'';
      if(r0==='HIT')hits++;if(r0==='K')ks++;
      const cls0=r0==='HIT'?'pr-hit':r0==='K'?'pr-k':r0==='OUT'?'pr-out':'';
      html+=`<td class="${cls0}">${r0}</td>`;
      if(abs.length>1){
        const more=abs.slice(1).map(ab=>{const r=abResult(ab);if(r==='HIT')hits++;if(r==='K')ks++;return r;});
        html+=`<td>${more.join(' / ')}</td>`;
      } else html+=`<td></td>`;
    });
    html+=`<td class="td-total">${totalABs||''}</td><td class="td-total ${hits?'pr-hit':''}">${hits||''}</td><td class="td-total ${ks?'pr-k':''}">${ks||''}</td></tr>`;
  });
  html+=`</tbody></table></div>`;

  /* PAGES PER PITCHER */
  state.pitchers.forEach(pitcher=>{
    const st=pitcherStats(pitcher);
    const jerseys=Object.keys(pitcher.batters).map(Number).sort((a,b)=>a-b);
    const hAll=heatImg(pitcher,'all',260);
    const hFB=heatImg(pitcher,'FB',170);
    const hNFB=heatImg(pitcher,'NFB',170);

    html+=`<div class="pr-page">
      <div class="pr-pitcher-name">${pitcher.name}</div>
      <table class="pr-stats-table"><thead><tr>
        <th>Pitches</th><th>Balls</th><th>Strikes</th><th>Ks</th><th>Hits</th><th>Outs</th><th>FB</th><th>Non-FB</th>
      </tr></thead><tbody><tr>
        <td>${st.total}</td><td>${st.balls}</td><td>${st.strikes}</td><td>${st.ks}</td>
        <td>${st.hits}</td><td>${st.outs}</td><td>${st.fb}</td><td>${st.nfb}</td>
      </tr></tbody></table>
      <div style="display:flex;gap:10px;margin:10px 0;align-items:flex-start">
        <div><img src="${hFB}" style="width:150px;height:auto;border:.5px solid #ccc;border-radius:4px;display:block"/><div class="pr-heatmap-label">Fastball heatmap</div></div>
        <div><img src="${hNFB}" style="width:150px;height:auto;border:.5px solid #ccc;border-radius:4px;display:block"/><div class="pr-heatmap-label">Non-FB heatmap</div></div>
        <div><img src="${hAll}" style="width:220px;height:auto;border:.5px solid #ccc;border-radius:4px;display:block"/><div class="pr-heatmap-label">All pitches heatmap</div></div>
      </div>`;

    if(jerseys.length){
      html+=`<div class="pr-ab-section"><div class="pr-ab-section-title">At-bat breakdown \u2014 ${jerseys.length} batter${jerseys.length!==1?'s':''}</div><div class="pr-ab-grid">`;
      jerseys.forEach(jersey=>{
        const abs=pitcher.batters[jersey]||[];
        abs.forEach((ab,ai)=>{
          if(!ab.length)return;
          const finalR=abResult(ab);
          const frCls=finalR==='HIT'?'pr-hit':finalR==='K'?'pr-k':finalR==='OUT'?'pr-out':'';
          const zImg=canvasImg(ab,170,false);
          const seq=ab.map((p,i)=>{
            const sym=p.result==='SS'?'K\u2660':p.result==='SL'?'K\u25cb':p.result==='Ball'?'B':p.result==='Hit'?'H':'O';
            const cls=`pr-ab-pitch-item ${p.type}${p.result==='Hit'?' hit':p.result==='Out'?' out':''}`;
            return`<span class="${cls}">${i+1}. ${p.type} ${sym}</span>`;
          }).join('');
          html+=`<div class="pr-ab-card">
            <div class="pr-ab-card-header">
              <span class="pr-ab-batter">#${jersey}</span>
              <span class="pr-ab-label">AB ${ai+1}</span>
              <span class="pr-ab-label ${frCls}" style="font-weight:700">${finalR}</span>
            </div>
            <img src="${zImg}" style="width:100%;max-width:155px;height:auto;display:block;margin:3px auto;border:.5px solid #ccc;border-radius:4px"/>
            <div class="pr-ab-pitches">${seq}</div>
          </div>`;
        });
      });
      html+=`</div></div>`;
    }
    html+=`</div>`;
  });

  report.innerHTML=html;
  setTimeout(()=>{window.print();setTimeout(()=>{report.innerHTML='';},3000);},300);
}
